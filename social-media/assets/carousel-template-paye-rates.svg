<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1080" height="1080" fill="#09090B"/>

  <!-- Green top bar -->
  <rect x="0" y="0" width="1080" height="12" fill="#22C55E"/>

  <!-- Title area -->
  <text x="540" y="130" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white">Jamaica PAYE Rates</text>
  <text x="540" y="185" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="#22C55E">2025 / 2026</text>

  <text x="540" y="235" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#71717a">Save this for your records 📌</text>

  <!-- Divider -->
  <rect x="80" y="260" width="920" height="2" fill="#27272a"/>

  <!-- Rate cards -->
  <!-- Card 1: Tax-free threshold -->
  <rect x="80" y="290" width="880" height="120" rx="12" fill="#18181b"/>
  <text x="160" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#71717a">Tax-Free Threshold (Annual)</text>
  <text x="160" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="#22C55E">J$1,500,096</text>
  <text x="870" y="365" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#22C55E">✅ FREE</text>

  <!-- Card 2: Standard rate -->
  <rect x="80" y="430" width="880" height="120" rx="12" fill="#18181b"/>
  <text x="160" y="485" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#71717a">Above threshold — up to J$6M/yr</text>
  <text x="160" y="525" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="white">25%</text>
  <text x="870" y="505" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#f59e0b">⚠️ Standard</text>

  <!-- Card 3: Higher rate -->
  <rect x="80" y="570" width="880" height="120" rx="12" fill="#18181b"/>
  <text x="160" y="625" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#71717a">Above J$6M per year</text>
  <text x="160" y="665" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="700" fill="white">30%</text>
  <text x="870" y="645" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#ef4444">⚠️ Higher</text>

  <!-- Card 4: NHT -->
  <rect x="80" y="710" width="420" height="120" rx="12" fill="#18181b"/>
  <text x="160" y="755" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717a">NHT</text>
  <text x="160" y="798" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">2% / 3%</text>
  <text x="160" y="822" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#52525b">employee / employer</text>

  <!-- Card 5: NIS -->
  <rect x="540" y="710" width="420" height="120" rx="12" fill="#18181b"/>
  <text x="620" y="755" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#71717a">NIS</text>
  <text x="620" y="798" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">3% / 3%</text>
  <text x="620" y="822" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#52525b">employee / employer</text>

  <!-- CTA -->
  <rect x="240" y="880" width="600" height="70" rx="35" fill="#22C55E"/>
  <text x="540" y="922" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#09090B">Calculate yours FREE at payrolljamaica.com</text>

  <!-- Bottom brand -->
  <text x="540" y="1045" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#3f3f46">@payrolljamaica | 🇯🇲 Built for Jamaica</text>

  <!-- Green bottom bar -->
  <rect x="0" y="1068" width="1080" height="12" fill="#22C55E"/>
</svg>
