<svg width="1128" height="191" viewBox="0 0 1128 191" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1128" height="191" fill="#09090B"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1e" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1128" height="191" fill="url(#grid)"/>

  <!-- Green accent bar left -->
  <rect x="0" y="0" width="6" height="191" fill="#22C55E"/>

  <!-- Logo mark (P icon from favicon) -->
  <g transform="translate(60, 64)">
    <rect width="64" height="64" rx="8" fill="#18181b"/>
    <path d="M28 34H8L16 26H24L42 8H54L28 34Z" fill="#D9D9D9"/>
    <path d="M30 40V36L56 10V14L30 40Z" fill="#D9D9D9"/>
    <path d="M30 48V44L56 18V22L30 48Z" fill="#D9D9D9"/>
    <path d="M30 56V52L40 42V46L30 56Z" fill="#D9D9D9"/>
  </g>

  <!-- Company name -->
  <text x="148" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">Payroll</text>
  <text x="266" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#22C55E" font-style="italic">Jamaica</text>

  <!-- Tagline -->
  <text x="148" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#71717a">Jamaica's payroll &amp; HR software — PAYE, NHT, NIS compliance automated</text>

  <!-- Right side decorative elements -->
  <text x="800" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3f3f46">✅ PAYE Compliance</text>
  <text x="800" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3f3f46">✅ NHT Contributions</text>
  <text x="800" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3f3f46">✅ NIS Deductions</text>

  <text x="960" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3f3f46">✅ Payslip Generation</text>
  <text x="960" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#3f3f46">✅ TAJ Ready Records</text>
  <text x="960" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#22C55E">🇯🇲 Built for Jamaica</text>

